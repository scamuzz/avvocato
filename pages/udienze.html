<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Udienze - Studio Legale</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-protected="true">
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><i class="fas fa-balance-scale"></i><span>Studio Legale</span></div>
  <nav class="sidebar-nav"><ul>
    <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
    <li class="nav-section">Gestione</li>
    <li><a href="clienti.html"><i class="fas fa-users"></i> Clienti</a></li>
    <li><a href="pratiche.html"><i class="fas fa-briefcase"></i> Pratiche</a></li>
    <li class="nav-section">Agenda</li>
    <li><a href="appuntamenti.html"><i class="fas fa-calendar-check"></i> Appuntamenti</a></li>
    <li><a href="udienze.html" class="active"><i class="fas fa-gavel"></i> Udienze</a></li>
    <li class="nav-section">Archivio</li>
    <li><a href="documenti.html"><i class="fas fa-file-alt"></i> Documenti</a></li>
    <li><a href="note.html"><i class="fas fa-sticky-note"></i> Note Interne</a></li>
    <li><a href="richieste.html"><i class="fas fa-inbox"></i> Richieste</a></li>
  </ul></nav>
</aside>
<nav class="topnav">
  <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
  <span class="topnav-title">Udienze</span>
  <div class="topnav-user">
    <div class="user-avatar" id="userAvatar">--</div>
    <span class="topnav-user-name" id="userDisplayName"></span>
    <button onclick="logoutUser()" class="btn btn-sm btn-danger"><i class="fas fa-sign-out-alt"></i> Esci</button>
  </div>
</nav>
<main class="main-content">
  <div class="page-content">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Udienze</h1>
        <p>Gestisci le udienze in tribunale</p>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> Nuova Udienza</button>
      </div>
    </div>
    <!-- Upcoming hearings alert -->
    <div id="prossimeContainer" class="mb-4"></div>
    <!-- Filters -->
    <div class="filter-bar">
      <select id="filterPratica" class="form-control" style="max-width:220px" onchange="applyFilters()">
        <option value="">Tutte le pratiche</option>
      </select>
      <input type="date" id="filterDa" class="form-control" style="max-width:150px" onchange="applyFilters()" title="Da data">
      <input type="date" id="filterA" class="form-control" style="max-width:150px" onchange="applyFilters()" title="A data">
      <button class="btn btn-secondary btn-sm" onclick="clearFilters()"><i class="fas fa-times"></i> Cancella</button>
      <span class="text-muted text-small" id="countLabel"></span>
    </div>
    <div id="udienzeContainer">
      <div class="empty-state">
        <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--text-light)"></i>
        <p>Caricamento...</p>
      </div>
    </div>
  </div>
</main>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="udienzaModalOverlay">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="udienzaModalTitle">Nuova Udienza</h3>
      <button class="modal-close" onclick="closeModal('udienzaModalOverlay')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <form id="udienzaForm">
        <input type="hidden" id="udienzaId">
        <div class="form-group">
          <label class="form-label">Pratica *</label>
          <select id="uPraticaId" class="form-control" required><option value="">Seleziona pratica...</option></select>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Data *</label><input type="date" id="uData" class="form-control" required></div>
          <div class="form-group"><label class="form-label">Ora</label><input type="time" id="uOra" class="form-control"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Tribunale *</label><input type="text" id="uTribunale" class="form-control" required placeholder="Tribunale di Roma"></div>
          <div class="form-group"><label class="form-label">Giudice</label><input type="text" id="uGiudice" class="form-control" placeholder="Dott.ssa Verdi"></div>
        </div>
        <div class="form-group"><label class="form-label">Note</label><textarea id="uNote" class="form-control" rows="3" placeholder="Note sull'udienza..."></textarea></div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('udienzaModalOverlay')">Annulla</button>
      <button class="btn btn-primary" onclick="saveUdienza()"><i class="fas fa-save"></i> Salva</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/utilities.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/udienze.js"></script>
</body>
</html>
