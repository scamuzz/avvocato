<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accedi - Studio Legale</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; background: linear-gradient(135deg, #1E3A5F 0%, #2C5282 50%, #1A365D 100%); display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .container { width: 100%; max-width: 420px; animation: fadeUp 0.4s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .logo { text-align: center; margin-bottom: 2rem; color: white; }
    .logo i { font-size: 3rem; color: #63B3ED; display: block; margin-bottom: 0.75rem; }
    .logo h1 { font-size: 1.5rem; font-weight: 800; }
    .logo p { color: rgba(255,255,255,0.7); font-size: 0.875rem; }
    .card { background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
    .card-header { background: #F7FAFC; padding: 1.5rem; border-bottom: 1px solid #E2E8F0; text-align: center; }
    .card-header h2 { font-size: 1.1rem; font-weight: 700; color: #1E3A5F; }
    .card-header p { font-size: 0.825rem; color: #718096; margin-top: 0.2rem; }
    .card-body { padding: 1.75rem; }
    .fg { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.1rem; }
    .fg label { font-size: 0.875rem; font-weight: 500; color: #2D3748; }
    .iw { position: relative; }
    .iw i { position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%); color: #A0AEC0; font-size: 0.9rem; }
    .fg input { width: 100%; padding: 0.7rem 0.875rem 0.7rem 2.5rem; border: 1.5px solid #E2E8F0; border-radius: 8px; font-size: 0.9rem; color: #2D3748; transition: border-color 0.2s, box-shadow 0.2s; }
    .fg input:focus { outline: none; border-color: #3182CE; box-shadow: 0 0 0 3px rgba(49,130,206,0.12); }
    .btn-submit { width: 100%; padding: 0.8rem; background: #1E3A5F; color: white; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn-submit:hover { background: #2C5282; }
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }
    .link { display: block; text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #3182CE; cursor: pointer; text-decoration: underline; }
    .back { display: block; text-align: center; margin-top: 0.75rem; font-size: 0.82rem; color: #718096; text-decoration: none; }
    .error { background: #FED7D7; color: #742A2A; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    .success { background: #C6F6D5; color: #22543D; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    .hidden { display: none !important; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body data-page="login">
  <div class="container">
    <div class="logo">
      <i class="fas fa-balance-scale"></i>
      <h1>Studio Legale</h1>
      <p>Area Gestionale Riservata</p>
    </div>
    <div class="card">
      <div class="card-header"><h2>Accedi</h2><p>Inserisci le tue credenziali</p></div>
      <div class="card-body">
        <!-- Login -->
        <div id="loginSection">
          <div id="loginError" class="error"></div>
          <form id="loginForm">
            <div class="fg"><label>Email</label><div class="iw"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" required placeholder="nome@studio.it" autocomplete="email"></div></div>
            <div class="fg"><label>Password</label><div class="iw"><i class="fas fa-lock"></i><input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password"></div></div>
            <button type="submit" class="btn-submit" id="btnLogin"><i class="fas fa-sign-in-alt"></i> Accedi</button>
          </form>
          <a class="link" onclick="showSection('resetSection')">Password dimenticata?</a>
          <a href="../index.html" class="back"><i class="fas fa-arrow-left"></i> Torna al sito</a>
        </div>
        <!-- Reset -->
        <div id="resetSection" class="hidden">
          <div id="resetSuccess" class="success"></div>
          <div id="resetError" class="error"></div>
          <p style="font-size:0.875rem;color:#4A5568;margin-bottom:1rem">Inserisci la tua email per ricevere il link di recupero.</p>
          <form id="resetForm">
            <div class="fg"><label>Email</label><div class="iw"><i class="fas fa-envelope"></i><input type="email" id="resetEmail" required placeholder="nome@studio.it"></div></div>
            <button type="submit" class="btn-submit" id="btnReset"><i class="fas fa-paper-plane"></i> Invia Link</button>
          </form>
          <a class="link" onclick="showSection('loginSection')">← Torna al login</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script>
    function showSection(id) {
      ['loginSection','resetSection'].forEach(s => document.getElementById(s).classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }
    function setLoading(btn, loading, defaultHtml) {
      btn.disabled = loading;
      btn.innerHTML = loading ? '<span class="spinner"></span> Attendere...' : defaultHtml;
    }

    // Login
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('loginError');
      err.style.display = 'none';
      setLoading(btn, true, '<i class="fas fa-sign-in-alt"></i> Accedi');
      try {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPassword').value;
        await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        await auth.signInWithEmailAndPassword(email, pass);
        window.location.href = 'dashboard.html';
      } catch (ex) {
        const msgs = { 'auth/user-not-found':'Utente non trovato.','auth/wrong-password':'Password errata.','auth/invalid-email':'Email non valida.','auth/too-many-requests':'Troppi tentativi, riprova tra poco.','auth/invalid-credential':'Credenziali non valide.' };
        err.textContent = msgs[ex.code] || ex.message;
        err.style.display = 'block';
        setLoading(btn, false, '<i class="fas fa-sign-in-alt"></i> Accedi');
      }
    });

    // Reset
    document.getElementById('resetForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btnReset');
      document.getElementById('resetError').style.display = 'none';
      document.getElementById('resetSuccess').style.display = 'none';
      setLoading(btn, true, '<i class="fas fa-paper-plane"></i> Invia Link');
      try {
        await auth.sendPasswordResetEmail(document.getElementById('resetEmail').value.trim());
        document.getElementById('resetSuccess').textContent = '✓ Email inviata! Controlla la casella di posta.';
        document.getElementById('resetSuccess').style.display = 'block';
      } catch (ex) {
        document.getElementById('resetError').textContent = ex.message;
        document.getElementById('resetError').style.display = 'block';
      } finally { setLoading(btn, false, '<i class="fas fa-paper-plane"></i> Invia Link'); }
    });

    // Redirect if already logged in
    auth.onAuthStateChanged(u => { if (u) window.location.href = 'dashboard.html'; });
  </script>
</body>
</html>
