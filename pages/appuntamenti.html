<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appuntamenti — Studio Legale</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-overlay.active .modal { transform: scale(1) translateY(0); }

    .view-toggle { display: flex; border: 1px solid var(--grey-200); border-radius: var(--radius); overflow: hidden; }
    .view-toggle .btn { border-radius: 0; border: none; padding: 8px 16px; }
    .view-toggle .btn.active { background: var(--primary); color: var(--white); }

    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day-name { text-align: center; font-size: 11px; font-weight: 700; color: var(--text-muted); padding: 8px 4px; text-transform: uppercase; letter-spacing: .05em; }
    .cal-day { min-height: 90px; background: var(--white); border: 1px solid var(--grey-100); border-radius: var(--radius); padding: 6px; cursor: pointer; transition: var(--transition); }
    .cal-day:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); }
    .cal-day.today { border-color: var(--accent); background: var(--info-light); }
    .cal-day.other-month { background: var(--grey-50); opacity: 0.55; pointer-events: none; }
    .cal-day-num { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .cal-day.today .cal-day-num { background: var(--accent); color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; }
    .cal-chip { font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-bottom: 2px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .cal-chip.prog { background: var(--info-light); color: var(--info); }
    .cal-chip.conf { background: var(--success-light); color: var(--success); }
    .cal-chip.canc { background: var(--danger-light); color: var(--danger); }
    .cal-chip.comp { background: var(--grey-100); color: var(--grey-600); }
  </style>
</head>
<body data-protected="true">

  <aside class="sidebar" id="sidebar">
    <a class="sidebar-logo" href="dashboard.html">
      <div class="sidebar-logo-icon">⚖</div>
      <div class="sidebar-logo-text">
        <span class="sidebar-logo-title">Studio Legale</span>
        <span class="sidebar-logo-sub">Avv. C. Scamuzzi</span>
      </div>
    </a>
    <button class="sidebar-toggle" id="sidebarCollapseBtn" aria-label="Comprimi">‹</button>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Gestione</span>
      <a href="dashboard.html" class="nav-item">
        <span class="nav-item-icon"><i class="fas fa-tachometer-alt"></i></span>
        <span class="nav-item-text">Dashboard</span>
      </a>
      <a href="clienti.html" class="nav-item">
        <span class="nav-item-icon"><i class="fas fa-users"></i></span>
        <span class="nav-item-text">Clienti</span>
      </a>
      <a href="pratiche.html" class="nav-item">
        <span class="nav-item-icon"><i class="fas fa-folder-open"></i></span>
        <span class="nav-item-text">Pratiche</span>
      </a>
      <a href="appuntamenti.html" class="nav-item active">
        <span class="nav-item-icon"><i class="fas fa-calendar-alt"></i></span>
        <span class="nav-item-text">Appuntamenti</span>
      </a>
      <a href="udienze.html" class="nav-item">
        <span class="nav-item-icon"><i class="fas fa-gavel"></i></span>
        <span class="nav-item-text">Udienze</span>
      </a>
      <a href="documenti.html" class="nav-item">
        <span class="nav-item-icon"><i class="fas fa-file-alt"></i></span>
        <span class="nav-item-text">Documenti</span>
      </a>
      <a href="note.html" class="nav-item">
        <span class="nav-item-icon"><i class="fas fa-sticky-note"></i></span>
        <span class="nav-item-text">Note</span>
      </a>
      <a href="richieste.html" class="nav-item">
        <span class="nav-item-icon"><i class="fas fa-envelope"></i></span>
        <span class="nav-item-text">Richieste</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="userAvatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="userDisplayName">—</div>
          <div class="sidebar-user-role">Avvocato</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <nav class="navbar">
      <div class="navbar-left">
        <button class="navbar-hamburger" id="sidebarToggle" aria-label="Menu">
          <i class="fas fa-bars"></i>
        </button>
        <div class="navbar-breadcrumb">
          <span>Studio Legale</span>
          <span>›</span>
          <span class="current">Appuntamenti</span>
        </div>
      </div>
      <div class="navbar-right">
        <div class="navbar-user">
          <div class="navbar-user-avatar" id="navUserAvatar">?</div>
          <span class="navbar-user-name" id="navUserName">—</span>
        </div>
        <button class="btn-logout" onclick="logoutUser()">
          <i class="fas fa-sign-out-alt"></i> Esci
        </button>
      </div>
    </nav>

    <div class="page-container">
      <div class="page-header">
        <div>
          <h1 class="page-title">Appuntamenti</h1>
          <p class="page-subtitle">Gestione degli appuntamenti con i clienti</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openNewAppModal()">
            <i class="fas fa-plus"></i> Nuovo Appuntamento
          </button>
        </div>
      </div>

      <!-- Filter / View Toggle Bar -->
      <div class="card mb-4">
        <div class="card-body">
          <div class="d-flex align-center gap-3" style="flex-wrap:wrap;">
            <div class="view-toggle" id="view-toggle">
              <button class="btn btn-ghost active" id="btn-lista" onclick="switchView('lista')">
                <i class="fas fa-list"></i> Lista
              </button>
              <button class="btn btn-ghost" id="btn-calendario" onclick="switchView('calendario')">
                <i class="fas fa-calendar"></i> Calendario
              </button>
            </div>
            <div class="form-group" style="margin:0; min-width:180px; flex:1;">
              <select class="form-control" id="filter-stato" onchange="_applyFilters()">
                <option value="">Tutti gli stati</option>
                <option value="Programmato">Programmato</option>
                <option value="Confermato">Confermato</option>
                <option value="Cancellato">Cancellato</option>
                <option value="Completato">Completato</option>
              </select>
            </div>
            <div class="form-group" style="margin:0;">
              <input type="month" class="form-control" id="filter-month" onchange="_applyFilters()">
            </div>
            <button class="btn btn-ghost btn-sm" onclick="document.getElementById('filter-stato').value=''; document.getElementById('filter-month').value=''; _applyFilters();">
              <i class="fas fa-times"></i> Reset
            </button>
          </div>
        </div>
      </div>

      <!-- List View -->
      <div id="list-view">
        <div class="table-wrapper">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Data</th>
                <th>Ora</th>
                <th>Cliente</th>
                <th>Pratica</th>
                <th>Luogo</th>
                <th>Stato</th>
                <th>Azioni</th>
              </tr>
            </thead>
            <tbody id="tbl-app-body">
              <tr><td colspan="7" class="text-center text-muted" style="padding:40px;">
                <i class="fas fa-spinner fa-spin"></i> Caricamento...
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Calendar View -->
      <div id="calendar-view" class="d-none">
        <div class="card">
          <div class="card-body">
            <div class="cal-header">
              <button class="btn btn-ghost btn-sm" onclick="prevMonth()">
                <i class="fas fa-chevron-left"></i>
              </button>
              <h3 id="cal-month-title" style="margin:0; font-size:1.1rem; font-weight:600;"></h3>
              <button class="btn btn-ghost btn-sm" onclick="nextMonth()">
                <i class="fas fa-chevron-right"></i>
              </button>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Appuntamento -->
  <div class="modal-overlay" id="modal-appuntamento">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-app-title">Nuovo Appuntamento</h3>
        <button class="modal-close" onclick="closeModal('modal-appuntamento')">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label"><i class="fas fa-user-tie"></i> Cliente <span class="required">*</span></label>
            <select class="form-control" id="f-clienteId" onchange="_loadPraticheOpts(this.value, null)">
              <option value="">Seleziona cliente...</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label"><i class="fas fa-folder-open"></i> Pratica</label>
            <select class="form-control" id="f-praticaId">
              <option value="">Nessuna pratica</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label"><i class="fas fa-calendar-day"></i> Data <span class="required">*</span></label>
            <input type="date" class="form-control" id="f-data">
          </div>
          <div class="form-group">
            <label class="form-label"><i class="fas fa-clock"></i> Ora <span class="required">*</span></label>
            <input type="time" class="form-control" id="f-ora">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-location-dot"></i> Luogo</label>
          <input type="text" class="form-control" id="f-luogo" placeholder="Es: Studio, Tribunale, Video-call...">
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-align-left"></i> Descrizione</label>
          <textarea class="form-control" id="f-descrizione" rows="3" placeholder="Note sull'appuntamento..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-flag"></i> Stato</label>
          <select class="form-control" id="f-stato">
            <option value="Programmato">Programmato</option>
            <option value="Confermato">Confermato</option>
            <option value="Cancellato">Cancellato</option>
            <option value="Completato">Completato</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('modal-appuntamento')">Annulla</button>
        <button class="btn btn-primary" id="btn-save-app" onclick="saveAppuntamento()">
          <i class="fas fa-save"></i> Salva
        </button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utilities.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/appuntamenti.js"></script>
</body>
</html>
